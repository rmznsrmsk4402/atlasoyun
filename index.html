<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#060912">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" href="icon-192.png">
<title>Atlas — World Guessing Game</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--bg:#060912;--panel:#0d1426;--ink:#dce6ff;--muted:#5d7099;--accent:#f2c14e;
--accent2:#4d9de0;--good:#3ddc84;--bad:#ff5a6e;}
html,body{height:100%;overscroll-behavior:none;}
body{background:var(--bg);font-family:'Trebuchet MS','Segoe UI',sans-serif;color:var(--ink);
display:flex;flex-direction:column;align-items:center;min-height:100vh;overflow-x:hidden;user-select:none;}
.sky{position:fixed;inset:0;z-index:0;pointer-events:none;
background:radial-gradient(ellipse at 20% 15%,rgba(60,100,180,.18),transparent 45%),
radial-gradient(ellipse at 80% 80%,rgba(120,70,180,.14),transparent 45%),var(--bg);}
.star{position:absolute;background:#fff;border-radius:50%;animation:tw var(--d) ease-in-out infinite alternate;}
@keyframes tw{from{opacity:.15}to{opacity:.95}}
.wrap{position:relative;z-index:1;width:100%;max-width:560px;display:flex;flex-direction:column;
align-items:center;padding:12px 12px 28px;gap:11px;}
header{text-align:center;position:relative;width:100%;}
.brand{font-size:.66rem;letter-spacing:6px;color:var(--accent);text-transform:uppercase;}
.title{font-size:1.5rem;font-weight:700;margin-top:2px;
background:linear-gradient(90deg,#fff,#9db8e8);-webkit-background-clip:text;background-clip:text;color:transparent;}
.langtoggle{position:absolute;top:0;right:0;display:flex;background:var(--panel);
border:1px solid rgba(120,160,255,.2);border-radius:20px;overflow:hidden;}
.langtoggle button{background:none;border:none;color:var(--muted);padding:6px 12px;font-size:.72rem;
font-weight:700;cursor:pointer;font-family:inherit;transition:.15s;}
.langtoggle button.active{background:var(--accent2);color:#fff;}
.hud{width:100%;display:flex;gap:8px;}
.chip{flex:1;background:var(--panel);border:1px solid rgba(120,160,255,.14);border-radius:12px;padding:8px 6px;text-align:center;}
.chip .lab{font-size:.54rem;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}
.chip .val{font-size:1.05rem;font-weight:700;margin-top:2px;}
.val.lv{color:var(--accent);}.val.hp{color:var(--bad);}.val.hint{color:#7fd3ff;}
.levelbar{width:100%;height:7px;background:rgba(120,160,255,.1);border-radius:10px;overflow:hidden;}
.levelfill{height:100%;width:0%;background:linear-gradient(90deg,var(--accent2),var(--accent));transition:width .4s;border-radius:10px;}
.mapbox{width:100%;aspect-ratio:2/1;background:linear-gradient(180deg,#0a2547,#06152e);
border:1px solid rgba(120,160,255,.2);border-radius:16px;overflow:hidden;position:relative;
box-shadow:0 0 40px rgba(60,120,220,.25),inset 0 0 50px rgba(0,0,0,.4);touch-action:none;}
svg{width:100%;height:100%;display:block;cursor:grab;}
svg:active{cursor:grabbing;}
.land{fill:#2c6e3f;stroke:rgba(150,210,170,.4);stroke-width:.6;}
.land.q{fill:#357a47;}
.land.target{fill:#f2c14e!important;stroke:#fff;stroke-width:1.5;animation:pulse 1.3s ease-in-out infinite;}
@keyframes pulse{0%,100%{fill:#f2c14e;}50%{fill:#ffe089;}}
.zoomhint{position:absolute;bottom:6px;right:8px;font-size:.6rem;color:rgba(160,200,255,.45);}
.quiz{width:100%;background:var(--panel);border:1px solid rgba(120,160,255,.16);border-radius:18px;
padding:15px;box-shadow:0 10px 40px rgba(0,0,0,.45);}
.q-head{font-size:1rem;color:var(--accent2);margin-bottom:12px;font-weight:700;text-align:center;}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.opt{background:rgba(40,60,110,.5);border:1px solid rgba(120,160,255,.18);border-radius:12px;
color:var(--ink);padding:14px 8px;font-size:.88rem;font-weight:600;cursor:pointer;transition:.15s;
text-align:center;font-family:inherit;}
.opt:hover{background:rgba(70,110,200,.55);}
.opt:disabled{cursor:default;}
.opt.correct{background:rgba(61,220,132,.25);border-color:var(--good);color:#aaffcc;}
.opt.wrong{background:rgba(255,90,110,.22);border-color:var(--bad);color:#ffb0bb;}
.actions{display:flex;gap:9px;margin-top:11px;}
.hintbtn{flex:1;background:rgba(127,211,255,.12);border:1px solid rgba(127,211,255,.4);border-radius:12px;
color:#7fd3ff;padding:11px;font-size:.82rem;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s;}
.hintbtn:hover{background:rgba(127,211,255,.22);}
.hintbtn:disabled{opacity:.4;cursor:default;}
.hintbox{margin-top:11px;background:rgba(127,211,255,.08);border-left:3px solid #7fd3ff;
border-radius:8px;padding:11px 13px;font-size:.84rem;line-height:1.5;color:#cce9ff;display:none;}
.hintbox.show{display:block;animation:fade .3s;}
@keyframes fade{from{opacity:0;transform:translateY(-4px);}to{opacity:1;}}
.fb{text-align:center;margin-top:11px;font-size:.92rem;font-weight:700;min-height:20px;}
.fb.win{color:var(--good);}.fb.lose{color:var(--bad);}
.next{display:block;margin:11px auto 0;background:linear-gradient(135deg,#1f3f86,#3568c8);
border:1px solid #4d8dff;border-radius:12px;color:#fff;padding:12px 36px;font-size:.88rem;cursor:pointer;
letter-spacing:2px;font-family:inherit;font-weight:700;}
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.7);
background:linear-gradient(135deg,#1a2f5e,#0d1830);border:2px solid var(--accent);border-radius:20px;
padding:24px 38px;text-align:center;z-index:50;opacity:0;pointer-events:none;
box-shadow:0 0 60px rgba(242,193,78,.5);transition:.4s cubic-bezier(.2,1.3,.4,1);}
.toast.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
.toast .big{font-size:1.4rem;font-weight:800;color:var(--accent);letter-spacing:1px;}
.toast .sub{font-size:.82rem;color:var(--muted);margin-top:5px;}
.over{position:fixed;inset:0;background:rgba(4,7,16,.93);z-index:60;display:none;flex-direction:column;
align-items:center;justify-content:center;gap:15px;backdrop-filter:blur(6px);padding:20px;text-align:center;}
.over.show{display:flex;}
.over h2{font-size:2rem;}
.over .st{color:var(--muted);font-size:1.05rem;}
.over .restart{background:linear-gradient(135deg,#1f3f86,#3568c8);border:1px solid #4d8dff;
border-radius:14px;color:#fff;padding:14px 44px;font-size:1rem;cursor:pointer;letter-spacing:2px;
font-family:inherit;font-weight:700;margin-top:6px;}
.win-emoji{font-size:3.5rem;animation:bounce 1s ease infinite;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-14px);}}
</style>
</head>

<script>
/* ===== i18n ===== */
const T={
 tr:{title:"Dünya Tahmin Oyunu",level:"Seviye",lives:"Can",hints:"İpucu",
  zoom:"İki parmakla yakınlaş · sürükle",
  question:"🌍 Haritada parlayan ülke hangisi?",
  hintHave:n=>`💡 İpucu (${n} hakkın var)`, hintNone:"💡 İpucu (hakkın yok)",
  next:"SONRAKİ →", retry:"TEKRAR DENE ↺",
  correct:tr=>`✅ Doğru! Burası ${tr}.`, wrong:"❌ Yanlış! Tekrar dene.",
  bonusLife:l=>['❤️ +1 CAN!',`Seviye ${l} bonusu`],
  bonusHint:l=>['💡 +1 İPUCU!',`Seviye ${l} bonusu`],
  winTitle:"KAZANDIN!", winSub:(lv)=>`53 ülkenin hepsini bildin!<br>Kalan can: ${lv} ♥`,
  loseTitle:"Oyun Bitti", loseSub:(l,t)=>`${l}/${t}. ülkeye kadar geldin`,
  restart:"TEKRAR OYNA"},
 en:{title:"World Guessing Game",level:"Level",lives:"Lives",hints:"Hints",
  zoom:"Pinch to zoom · drag to pan",
  question:"🌍 Which highlighted country is this?",
  hintHave:n=>`💡 Hint (${n} left)`, hintNone:"💡 Hint (none left)",
  next:"NEXT →", retry:"TRY AGAIN ↺",
  correct:tr=>`✅ Correct! This is ${tr}.`, wrong:"❌ Wrong! Try again.",
  bonusLife:l=>['❤️ +1 LIFE!',`Level ${l} bonus`],
  bonusHint:l=>['💡 +1 HINT!',`Level ${l} bonus`],
  winTitle:"YOU WON!", winSub:(lv)=>`You guessed all 53 countries!<br>Lives left: ${lv} ♥`,
  loseTitle:"Game Over", loseSub:(l,t)=>`You reached country ${l}/${t}`,
  restart:"PLAY AGAIN"}
};
let lang='tr';
function nameOf(c){return lang==='tr'?c.tr:c.en;}
function hintOf(c){return lang==='tr'?c.h:c.he;}
function setLang(l){
  lang=l;
  document.getElementById('btnTR').classList.toggle('active',l==='tr');
  document.getElementById('btnEN').classList.toggle('active',l==='en');
  document.documentElement.lang=l;
  const t=T[l];
  document.getElementById('gameTitle').textContent=t.title;
  document.getElementById('lblLevel').textContent=t.level;
  document.getElementById('lblLives').textContent=t.lives;
  document.getElementById('lblHints').textContent=t.hints;
  document.getElementById('zoomHint').textContent=t.zoom;
  refreshTexts();
}
/* refresh current-question texts when language switches mid-game */
function refreshTexts(){
  if(gameOver)return;
  const t=T[lang];
  document.getElementById('qHead').textContent=t.question;
  // re-render options with current language
  const grid=document.getElementById('opts');
  if(grid.dataset.opts){
    const optNames=JSON.parse(grid.dataset.opts); // array of country .n
    [...grid.children].forEach((b,i)=>{
      const c=QUIZ.find(x=>x.n===optNames[i]);
      b.textContent=nameOf(c);
    });
  }
  updateHintBtn();
  // hint box
  const hb=document.getElementById('hintBox');
  if(hb.classList.contains('show')&&target){hb.textContent='💡 '+hintOf(target);}
  // feedback
  if(answered){
    const fb=document.getElementById('fb');
    if(fb.classList.contains('win'))fb.textContent=t.correct(nameOf(target));
    else if(fb.classList.contains('lose'))fb.textContent=t.wrong;
    const nx=document.getElementById('next');
    if(nx.style.display!=='none')nx.textContent=(nx.dataset.retry==='1')?t.retry:t.next;
  }
}

/* stars */
const sky=document.getElementById('sky');
for(let i=0;i<140;i++){const s=document.createElement('div');s.className='star';
const z=Math.random()*2.2+.4;
s.style.cssText=`width:${z}px;height:${z}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(Math.random()*3+1.5).toFixed(1)}s;opacity:${Math.random()}`;
sky.appendChild(s);}

const svg=document.getElementById('map');
const paths=[...document.querySelectorAll('#mapg path')];
const QUIZ=C.map((c,i)=>({...c,idx:i})).filter(c=>c.q);
const TOTAL=QUIZ.length;

let vb={x:0,y:0,w:2000,h:1000};
function applyVB(){svg.setAttribute('viewBox',`${vb.x} ${vb.y} ${vb.w} ${vb.h}`);}
function clampVB(){if(vb.w>2000)vb.w=2000;if(vb.w<400)vb.w=400;vb.h=vb.w/2;
if(vb.x<0)vb.x=0;if(vb.y<0)vb.y=0;if(vb.x+vb.w>2000)vb.x=2000-vb.w;if(vb.y+vb.h>1000)vb.y=1000-vb.h;}
const pointers=new Map();let panStart=null,pinchStart=null;
svg.addEventListener('pointerdown',e=>{svg.setPointerCapture(e.pointerId);
pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
if(pointers.size===1)panStart={x:e.clientX,y:e.clientY,vbx:vb.x,vby:vb.y};
else if(pointers.size===2){const p=[...pointers.values()];
pinchStart={dist:Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y),w:vb.w};panStart=null;}});
svg.addEventListener('pointermove',e=>{if(!pointers.has(e.pointerId))return;
pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});const rect=svg.getBoundingClientRect();
if(pointers.size===2&&pinchStart){const p=[...pointers.values()];
const d=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y);let nw=pinchStart.w*(pinchStart.dist/d);
nw=Math.max(400,Math.min(2000,nw));vb.w=nw;clampVB();applyVB();}
else if(panStart){const dx=e.clientX-panStart.x,dy=e.clientY-panStart.y;
vb.x=panStart.vbx-dx*(vb.w/rect.width);vb.y=panStart.vby-dy*(vb.h/rect.height);clampVB();applyVB();}});
function up(e){pointers.delete(e.pointerId);if(pointers.size<2)pinchStart=null;
if(pointers.size<1)panStart=null;try{svg.releasePointerCapture(e.pointerId);}catch(_){}}
svg.addEventListener('pointerup',up);svg.addEventListener('pointercancel',up);
svg.addEventListener('wheel',e=>{e.preventDefault();const f=e.deltaY>0?1.12:0.89;
let nw=vb.w*f;nw=Math.max(400,Math.min(2000,nw));vb.w=nw;clampVB();applyVB();},{passive:false});

function focusCountry(c){const path=paths[c.idx];const bb=path.getBBox();
let w=Math.max(bb.width,bb.height)*2.4;w=Math.max(400,Math.min(2000,w));
vb.w=w;vb.h=w/2;vb.x=bb.x+bb.width/2-vb.w/2;vb.y=bb.y+bb.height/2-vb.h/2;clampVB();applyVB();}

/* ===== game state ===== */
let level=1,lives=3,freeHints=0,answered=false,gameOver=false;
let order=[],target=null,targetPath=null,hintUsed=false;
const LIFE_LEVELS=[10,20,30,40,50];
const HINT_LEVELS=[5,10,15,20,25,30,35,40,45,50];

function dist2(a,b){const dx=a.cx-b.cx,dy=a.cy-b.cy;return dx*dx+dy*dy;}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function buildOrder(){order=shuffle(QUIZ.slice());}

function renderOptions(){
  const others=QUIZ.filter(x=>x.n!==target.n).map(x=>({x,d:dist2(x,target)}));
  others.sort((a,b)=>a.d-b.d);
  const near=others.slice(0,8).map(o=>o.x);shuffle(near);
  const opts=shuffle([target,...near.slice(0,3)]);
  const grid=document.getElementById('opts');grid.innerHTML='';
  grid.dataset.opts=JSON.stringify(opts.map(o=>o.n));
  opts.forEach(o=>{const b=document.createElement('button');b.className='opt';b.textContent=nameOf(o);
    b.onclick=()=>answer(o,b);grid.appendChild(b);});
}
function loadLevel(){
  answered=false;hintUsed=false;
  target=order[level-1];
  if(targetPath)targetPath.classList.remove('target');
  targetPath=paths[target.idx];targetPath.classList.add('target');
  focusCountry(target);
  renderOptions();
  document.getElementById('qHead').textContent=T[lang].question;
  document.getElementById('fb').textContent='';
  document.getElementById('next').style.display='none';
  document.getElementById('next').dataset.retry='';
  const hb=document.getElementById('hintBox');hb.classList.remove('show');hb.textContent='';
  updateHintBtn();updateHUD();
}
function updateHintBtn(){
  const btn=document.getElementById('hintBtn');const t=T[lang];
  if(answered||hintUsed){btn.disabled=true;return;}
  if(freeHints>0){btn.disabled=false;btn.textContent=t.hintHave(freeHints);}
  else{btn.disabled=true;btn.textContent=t.hintNone;}
}
document.getElementById('hintBtn').onclick=()=>{
  if(answered||hintUsed||freeHints<=0)return;hintUsed=true;freeHints--;
  const hb=document.getElementById('hintBox');hb.textContent='💡 '+hintOf(target);hb.classList.add('show');
  document.getElementById('hintBtn').disabled=true;updateHUD();
};
function answer(chosen,btn){
  if(answered)return;answered=true;const t=T[lang];
  const grid=document.getElementById('opts');
  [...grid.children].forEach(b=>{b.disabled=true;if(b.textContent===nameOf(target))b.classList.add('correct');});
  document.getElementById('hintBtn').disabled=true;
  const fb=document.getElementById('fb');
  if(chosen.n===target.n){
    btn.classList.add('correct');fb.textContent=t.correct(nameOf(target));fb.className='fb win';
    updateHUD();
    if(level>=TOTAL){winGame();return;}
    const nx=document.getElementById('next');nx.style.display='block';nx.dataset.retry='';nx.textContent=t.next;
  }else{
    btn.classList.add('wrong');lives--;fb.textContent=t.wrong;fb.className='fb lose';
    updateHUD();
    if(lives<=0){loseGame();return;}
    const nx=document.getElementById('next');nx.style.display='block';nx.dataset.retry='1';nx.textContent=t.retry;
  }
}
document.getElementById('next').onclick=()=>{
  if(gameOver)return;const btn=document.getElementById('next');
  if(btn.dataset.retry==='1'){btn.dataset.retry='';retryLevel();return;}
  level++;const t=T[lang];
  if(LIFE_LEVELS.includes(level)){lives++;const m=t.bonusLife(level);toast(m[0],m[1]);}
  if(HINT_LEVELS.includes(level)){freeHints++;const m=t.bonusHint(level);toast(m[0],m[1]);}
  loadLevel();
};
function retryLevel(){
  answered=false;hintUsed=false;renderOptions();
  document.getElementById('qHead').textContent=T[lang].question;
  document.getElementById('fb').textContent='';
  document.getElementById('next').style.display='none';
  const hb=document.getElementById('hintBox');hb.classList.remove('show');hb.textContent='';
  updateHintBtn();
}
function updateHUD(){
  document.getElementById('hLevel').textContent=level+'/'+TOTAL;
  document.getElementById('hLives').textContent='♥'.repeat(Math.max(0,lives));
  document.getElementById('hHints').textContent=freeHints;
  document.getElementById('levelFill').style.width=(level/TOTAL*100)+'%';
}
function toast(b,s){const t=document.getElementById('toast');
document.getElementById('toastBig').textContent=b;document.getElementById('toastSub').textContent=s;
t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1700);}
function winGame(){gameOver=true;if(targetPath)targetPath.classList.remove('target');
const t=T[lang];const o=document.getElementById('over');
o.innerHTML=`<div class="win-emoji">🏆</div><h2>${t.winTitle}</h2>
<div class="st">${t.winSub(lives)}</div>
<button class="restart" onclick="restart()">${t.restart}</button>`;o.classList.add('show');}
function loseGame(){gameOver=true;if(targetPath)targetPath.classList.remove('target');
const t=T[lang];const o=document.getElementById('over');
o.innerHTML=`<div style="font-size:3rem">🏁</div><h2>${t.loseTitle}</h2>
<div class="st">${t.loseSub(level,TOTAL)}</div>
<button class="restart" onclick="restart()">${t.restart}</button>`;o.classList.add('show');}
function restart(){level=1;lives=3;freeHints=0;gameOver=false;
document.getElementById('over').classList.remove('show');buildOrder();loadLevel();}
buildOrder();loadLevel();
</script>

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').catch(()=>{});});
}
</script>
